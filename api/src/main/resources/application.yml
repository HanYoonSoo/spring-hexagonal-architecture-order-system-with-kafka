spring:
  jpa:
    properties:
      hibernate:
        query.in_clause_parameter_padding: true
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    baseline-on-migrate: true
    out-of-order: true
  profiles:
    default: local
    active: local
  security:
    jwt:
      issuer: order-system
      access-token-expiration-seconds: 3600
      refresh-token-expiration-seconds: 1209600
      secret: ${ORDER_SYSTEM_JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
