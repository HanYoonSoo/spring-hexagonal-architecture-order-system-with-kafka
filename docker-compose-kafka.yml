services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    ports:
      - "29092:29092" # host 접속용
    volumes:
      - ./docker/order-system-kafka:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  kafka-init-topics:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka-init-topics
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        BOOTSTRAP=kafka:9092

        kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic order.created.v1 --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic notification.sent.v1 --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic notification.failed.v1 --partitions 1 --replication-factor 1

        for t in order.created.v1 notification.sent.v1 notification.failed.v1; do
          kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic $$t.retry --partitions 1 --replication-factor 1
          kafka-topics --bootstrap-server $$BOOTSTRAP --create --if-not-exists --topic $$t.dlt --partitions 1 --replication-factor 1
        done

        kafka-topics --bootstrap-server $$BOOTSTRAP --list
